services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${NAME_USER:-guest}
      POSTGRES_PASSWORD: ${PASSWORD_USER_DB:-guest}
      POSTGRES_DB: ${NAME_DB:-project_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NAME_USER:-guest} -d ${NAME_DB:-project_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
  migrations:
    build:
      context: ./api_service
      dockerfile: src/Dockerfile
    env_file:
      - .env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy # Ждем, пока база станет "здоровой"
    restart: on-failure
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_broker
    env_file:
      - .env
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_LOGIN}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_listener 5672"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    container_name: redis_storage
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
  
  worker_msg:
    build:
      context: ./api_service
      dockerfile: src/Dockerfile
    env_file:
      - .env
    command: celery -A src.celery_service.init_celery.celery worker -Q messages -c 2 -l info -n worker_msg@%h
    depends_on:
      rabbitmq:
        condition: service_healthy

  celery_beat:
    build:
      context: ./api_service
      dockerfile: src/Dockerfile
    env_file:
      - .env
    command: celery -A src.celery_service.init_celery.celery beat -l info
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker_cleanup:
    build:
      context: ./api_service
      dockerfile: src/Dockerfile
    env_file:
      - .env
    command: celery -A src.celery_service.init_celery.celery worker -Q cleanup_garbage -c 1 -l info -n worker_cleanup@%h
    depends_on:
      web:
        condition: service_started
  
  web:
    build:
      context: ./api_service
      dockerfile: src/Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --reload --port 8000 
    env_file:
      - .env
    volumes:
      - ./api_service:/usr/src/app
    ports:
      - "8000:8000"
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
  
  api_consumer:
    build:
      context: ./api_service
      dockerfile: src/Dockerfile
    environment:
      - PYTHONPATH=/usr/src/app
    env_file:
      - .env
    deploy:
      replicas: 2
    command: python -m src.rabbitmq_service.consumer
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
  
  ai_consumer:
    build:
      context: ./ai_service
      dockerfile: src/Dockerfile
    env_file:
      - .env
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    volumes:
      - ./ai_service:/usr/src/app
    environment:
      - PYTHONPATH=/usr/src/app
    command: python -m src.consumer
    depends_on:
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: always

volumes:
  minio_data:
  redis_data:
  rabbitmq_data:
  postgres_data: